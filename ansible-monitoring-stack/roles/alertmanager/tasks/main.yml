---
- name: Create Alertmanager group
  ansible.builtin.group:
    name: alertmanager
    system: true
    state: present

- name: Create Alertmanager user
  ansible.builtin.user:
    name: alertmanager
    group: alertmanager
    system: true
    shell: /sbin/nologin
    create_home: false
    state: present

- name: Create Alertmanager directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: '0755'
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager

- name: Download Alertmanager
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v0.27.0/alertmanager-0.27.0.linux-amd64.tar.gz"
    dest: "/opt/alertmanager-0.27.0.linux-amd64.tar.gz"
    mode: '0644'

- name: Extract Alertmanager
  ansible.builtin.unarchive:
    src: "/opt/alertmanager-0.27.0.linux-amd64.tar.gz"
    dest: "/opt"
    remote_src: true

- name: Install Alertmanager binaries
  ansible.builtin.copy:
    src: "/opt/alertmanager-0.27.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: alertmanager
    group: alertmanager
    mode: '0755'
    remote_src: true
  loop:
    - alertmanager
    - amtool

- name: Deploy Alertmanager configuration
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: alertmanager
    group: alertmanager
    mode: '0644'
  notify: Restart Alertmanager

- name: Create Alertmanager systemd service
  ansible.builtin.template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Enable and start Alertmanager service
  ansible.builtin.systemd:
    name: alertmanager
    enabled: true
    state: started
