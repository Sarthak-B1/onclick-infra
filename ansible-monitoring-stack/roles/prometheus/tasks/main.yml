---
- name: Create Prometheus group
  ansible.builtin.group:
    name: "{{ prometheus_group }}"
    system: true
    state: present

- name: Create Prometheus user
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    create_home: false
    shell: /sbin/nologin
    system: true
    state: present

- name: Check if prometheus directory exists
  ansible.builtin.stat:
    path: "{{ prometheus_current_dir }}"
  register: prometheus_dir_stat

- name: Remove existing prometheus directory if not symlink
  ansible.builtin.file:
    path: "{{ prometheus_current_dir }}"
    state: absent
  when: prometheus_dir_stat.stat.exists and prometheus_dir_stat.stat.isdir and not prometheus_dir_stat.stat.islnk

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"
    - "{{ prometheus_install_dir }}"

- name: Format Prometheus EBS volume if not formatted
  community.general.filesystem:
    fstype: ext4
    dev: /dev/xvdf

- name: Mount Prometheus EBS volume at data directory
  ansible.posix.mount:
    path: "{{ prometheus_data_dir }}"
    src: /dev/xvdf
    fstype: ext4
    state: mounted

- name: Ensure Prometheus data directory has correct permissions after mount
  ansible.builtin.file:
    path: "{{ prometheus_data_dir }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "{{ prometheus_download_url }}"
    dest: "/tmp/{{ prometheus_archive }}"
    mode: "0644"
  check_mode: false

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: "/tmp/{{ prometheus_archive }}"
    dest: /tmp
    remote_src: true
    creates: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
  check_mode: false

- name: Install Prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "{{ prometheus_install_dir }}/{{ item }}"
    remote_src: true
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
  loop:
    - prometheus
    - promtool
  notify:
    - Restart Prometheus

- name: Install Prometheus console assets
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "{{ prometheus_config_dir }}/{{ item }}"
    remote_src: true
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
  loop:
    - consoles
    - console_libraries

- name: Point Prometheus current symlink to selected version
  ansible.builtin.file:
    src: "{{ prometheus_install_dir }}"
    dest: "{{ prometheus_current_dir }}"
    state: link
    force: true

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0644"
  notify:
    - Restart Prometheus

- name: Create Prometheus systemd service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload Systemd
    - Restart Prometheus

- name: Enable and start Prometheus service
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
