plugin: amazon.aws.aws_ec2
regions:
  - ap-south-1
filters:
  tag:Project:
    - Monitoring Infrastructure
  instance-state-name:
    - running
hostnames:
  - private-ip-address
compose:
  ansible_host: public_ip_address if tags.Role == 'bastion' else private_ip_address
keyed_groups:
  - key: tags.Role
    prefix: role
groups:
  monitoring_node_exporter: "tags.Role in ['prometheus-primary', 'prometheus-replica']"
